name: General Feedback
description: Share feedback, questions, or anything else
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Got something to share? We are listening!

  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: What would you like to tell us?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any extra information, screenshots, or links.
